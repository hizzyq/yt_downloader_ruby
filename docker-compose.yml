version: '3.8'

services:
  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    volumes:
      - shared_media:/app/tmp/yt_media_engine
      - ./yt_tokens:/root/.cache/yt-dlp/
    depends_on:
      - redis

volumes:
  redis_data:
  shared_media:
