services:
  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - app_net

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
    networks:
      - app_net

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    volumes:
      - shared_media:/app/tmp/yt_media_engine
      - ./cookies.txt:/app/cookies.txt
    depends_on:
      - redis
    networks:
      - app_net

  proxy-bridge:
    image: ginuerzh/gost
    restart: unless-stopped
    # Заменяем user:pass@host:port на ваши данные из логов
    command: ""
    networks:
      - app_net

volumes:
  redis_data:
  shared_media:

networks:
  app_net:
    driver: bridge